{% extends "base.html" %}
{% block title %}SkyCheck — Real-Time Weather{% endblock %}
{% block body_class %}default{% endblock %}

{% block content %}
<div class="hero">
  <h1 class="hero-title">Real-Time Weather</h1>
  <p class="hero-sub">Search any city in the world</p>

  <form class="search-form" action="/weather" method="get">
    <div class="search-row">
      <input type="text" name="city" id="city-input"
             class="search-input"
             placeholder="Enter city name…"
             autocomplete="off"
             maxlength="100"
             required>
      <button type="submit" class="search-btn">Search</button>
    </div>
    {% if error %}
      <p class="search-error">{{ error }}</p>
    {% endif %}
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Prevent blank submission
  document.querySelector('.search-form').addEventListener('submit', function(e) {
    const val = document.getElementById('city-input').value.trim();
    if (!val) { e.preventDefault(); }
  });
</script>
{% endblock %}
