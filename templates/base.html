<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SkyCheck{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="{% block body_class %}default{% endblock %}">

<nav class="navbar">
  <a href="/" class="nav-brand">⛅ SkyCheck</a>
  <div class="nav-links">
    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
    <a href="/about" class="nav-link {% if request.path == '/about' %}active{% endif %}">About</a>
  </div>
</nav>

<main class="main">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <p>Data provided by <a href="https://openweathermap.org" target="_blank" rel="noopener">OpenWeatherMap</a>.
     For safety-critical decisions, consult your national meteorological service.</p>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
